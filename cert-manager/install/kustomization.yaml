apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - https://github.com/cert-manager/cert-manager/releases/download/v1.17.2/cert-manager.yaml
  - cluster-issuer.yaml

patches:
  # Annotate cert-manager SA for Workload Identity
  - target:
      kind: ServiceAccount
      name: cert-manager
      namespace: cert-manager
    patch: |
      - op: add
        path: /metadata/annotations
        value:
          iam.gke.io/gcp-service-account: cert-manager@incident-kb.iam.gserviceaccount.com
