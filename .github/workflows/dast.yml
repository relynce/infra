name: DAST (reusable)

# Dynamic Application Security Testing with OWASP ZAP.
# Authenticates via ZAP's native env-var support: ZAP_AUTH_HEADER,
# ZAP_AUTH_HEADER_VALUE, ZAP_AUTH_HEADER_SITE. zap-baseline.py /
# zap-full-scan.py read these and add a replacer rule that injects the
# header on every outbound request to the target site. The action-baseline
# Dockerfile already declares -e for these three vars; setting them on the
# step propagates them into the container.
#
# Earlier attempt used cmd_options="-z '-config replacer...'" but YAML
# interpolation drops the inner quotes, so docker tokenized "-z" alone and
# fed the rest to ZAP as positional args, exiting with "File not found".
# Env-var auth sidesteps the quoting hazard entirely.

on:
  workflow_call:
    inputs:
      target_url:
        description: "Base URL to scan (e.g. https://dev.revelara.ai)"
        type: string
        required: true
      mode:
        description: "baseline (passive, fast) or full (active, slower)"
        type: string
        default: baseline
      fail_on_warn:
        description: "Fail the job on ZAP warnings (gate strictness)"
        type: boolean
        default: false
    secrets:
      bearer_token:
        description: "Token for authenticated scan; omit for unauthenticated"
        required: false

permissions:
  contents: read
  issues: write           # ZAP action posts findings as issues by default
  pull-requests: write    # and as PR comments

jobs:
  zap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate inputs
        run: |
          if [ "${{ inputs.mode }}" != "baseline" ] && [ "${{ inputs.mode }}" != "full" ]; then
            echo "::error::mode must be 'baseline' or 'full'"
            exit 1
          fi

      - name: Resolve auth env
        id: auth
        env:
          TOKEN: ${{ secrets.bearer_token }}
          TARGET: ${{ inputs.target_url }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "::add-mask::$TOKEN"
            SITE=$(printf "%s" "$TARGET" | sed -E 's|^https?://([^/]+).*|\1|')
            echo "ZAP_AUTH_HEADER=Authorization" >> "$GITHUB_ENV"
            echo "ZAP_AUTH_HEADER_VALUE=Bearer $TOKEN" >> "$GITHUB_ENV"
            echo "ZAP_AUTH_HEADER_SITE=$SITE" >> "$GITHUB_ENV"
            echo "authenticated=true" >> "$GITHUB_OUTPUT"
          else
            echo "authenticated=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No bearer_token provided -- running unauthenticated DAST"
          fi

      - name: ZAP baseline scan
        if: inputs.mode == 'baseline'
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ inputs.target_url }}
          fail_action: ${{ inputs.fail_on_warn }}
          allow_issue_writing: false

      - name: ZAP full scan
        if: inputs.mode == 'full'
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          target: ${{ inputs.target_url }}
          fail_action: ${{ inputs.fail_on_warn }}
          allow_issue_writing: false
