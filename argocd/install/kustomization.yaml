apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  - namespace.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.3.6/manifests/install.yaml
  - service-internal.yaml
  - certificate.yaml
  - external-secret.yaml
  - secret-store.yaml

patches:
  - path: argocd-cm.yaml
  - path: argocd-rbac-cm.yaml
  - path: argocd-server-patch.yaml
