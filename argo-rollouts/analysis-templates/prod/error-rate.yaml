apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: canary-error-rate
  namespace: prod
spec:
  args:
    - name: canary-hash
    - name: stable-hash
  metrics:
    - name: error-rate-comparison
      interval: 30s
      count: 5
      successCondition: "result[0] <= 0.05"
      failureLimit: 2
      provider:
        prometheus:
          # GMP Prometheus-compatible query API
          # Requires argo-rollouts SA to have monitoring.viewer IAM role
          address: https://monitoring.googleapis.com/v1/projects/incident-kb/location/global/prometheus
          query: |
            sum(rate(polaris_http_requests_total{status=~"5..",rollouts_pod_template_hash="{{args.canary-hash}}"}[2m]))
            /
            sum(rate(polaris_http_requests_total{rollouts_pod_template_hash="{{args.canary-hash}}"}[2m]))
