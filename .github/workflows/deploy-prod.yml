name: Deploy Infrastructure to Production

on:
  push:
    branches:
      - main
    paths:
      - 'base/**'
      - 'overlays/prod/**'
      - '.github/workflows/deploy-prod.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deployed by Flux CD
        run: |
          echo "Infrastructure is deployed by Flux CD."
          echo "See polaris/k8s/flux/clusters/gke-prod/infra-sync.yaml for configuration."
          echo "To force reconciliation: flux reconcile kustomization infra-prod --with-source"
