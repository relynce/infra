apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argo-rollouts

resources:
  - namespace.yaml
  - https://github.com/argoproj/argo-rollouts/releases/download/v1.8.4/install.yaml
  - dashboard.yaml
  - dashboard-service.yaml

patches:
  - target:
      group: rbac.authorization.k8s.io
      version: v1
      kind: ClusterRole
      name: argo-rollouts
    patch: |
      - op: add
        path: /rules/-
        value:
          apiGroups: [""]
          resources: ["namespaces"]
          verbs: ["get", "list", "watch"]
  # Bind Workload Identity so the controller can query GCP Cloud Monitoring
  # for canary analysis (monitoring.viewer role on argo-rollouts@ GSA)
  - target:
      version: v1
      kind: ServiceAccount
      name: argo-rollouts
    patch: |
      - op: add
        path: /metadata/annotations/iam.gke.io~1gcp-service-account
        value: argo-rollouts@incident-kb.iam.gserviceaccount.com
