apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: canary-latency-p95
  namespace: prod
spec:
  args:
    - name: canary-hash
    - name: stable-hash
  metrics:
    - name: latency-comparison
      interval: 30s
      count: 5
      # P95 latency must stay under 2 seconds (matches PolarisHighLatencyP95 alert threshold)
      successCondition: "result[0] <= 2.0"
      failureLimit: 2
      provider:
        prometheus:
          address: https://monitoring.googleapis.com/v1/projects/incident-kb/location/global/prometheus
          query: |
            histogram_quantile(0.95,
              sum(rate(polaris_http_request_duration_seconds_bucket{rollouts_pod_template_hash="{{args.canary-hash}}"}[2m])) by (le)
            )
